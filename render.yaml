services:
  - type: web
    name: slot-booking-webapp
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      # Persistentes Volume einbinden: Symlinks für data/ und static/
      mkdir -p /opt/render/project/src/persist/static /opt/render/project/src/persist/data
      [ -L static ] || (rm -rf static && ln -s /opt/render/project/src/persist/static static)
      [ -L data ] || (rm -rf data && ln -s /opt/render/project/src/persist/data data)
      # Initiale Dateien/Verzeichnisse anlegen (idempotent)
      python initialize_persistence.py || true
      # availability.json ggf. generieren (idempotent)
      python generate_availability.py || true
      # App starten
      gunicorn slot_booking_webapp:app --workers 2 --threads 2 --timeout 120
    envVars:
      # Automatisch generierter Secret Key
      - key: SECRET_KEY
        generateValue: true
      
      # Python Version
      - key: PYTHON_VERSION
        value: "3.11"
      
      # Google Calendar ID
      - key: CENTRAL_CALENDAR_ID
        value: zentralkalenderzfa@gmail.com
      
      # Diese müssen in Render Secrets gesetzt werden:
      # - GOOGLE_CREDS_BASE64 (base64 encoded service account JSON)
      # - USERLIST (user:pass,user2:pass2 format)
    
    # Health Check
    healthCheckPath: /login
    
    # Automatisches Scaling (für 9€ Plan)
    scaling:
      minInstances: 1
      maxInstances: 1

    # Persistentes Volume (1 GB) für Laufzeitdaten (data/, static/)
    disks:
      - name: runtime-data
        mountPath: /opt/render/project/src/persist
        sizeGB: 1

