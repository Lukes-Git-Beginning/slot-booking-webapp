name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/business-hub

            # Save current hash for rollback
            PREV_HASH=$(git rev-parse HEAD)
            echo "Previous hash: $PREV_HASH"

            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            chown -R www-data:www-data /opt/business-hub/data/
            systemctl restart business-hub
            sleep 3

            # Health-Check with auto-rollback
            if ! curl -sf https://berater.zfa.gmbh/health; then
              echo "Health-Check FAILED — rolling back to $PREV_HASH"
              git checkout $PREV_HASH
              pip install -r requirements.txt --quiet
              systemctl restart business-hub
              sleep 3
              exit 1
            fi

            echo "Deploy successful: $(git rev-parse HEAD)"

      - name: Discord notification (success)
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Deploy erfolgreich: \`${{ github.sha }}\` von ${{ github.actor }}\"}"

      - name: Discord notification (failure)
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Deploy FEHLGESCHLAGEN: \`${{ github.sha }}\` von ${{ github.actor }} — Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
