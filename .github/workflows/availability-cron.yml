name: Generate Availability

on:
  schedule:
    # Mo–Fr von 05:00 bis 14:00 UTC → stündlich = 10 Läufe/Tag
    - cron: '5 5-14 * * 1-5'  # 5 Minuten nach jeder vollen Stunde
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDS_BASE64: ${{ secrets.GOOGLE_CREDS_BASE64 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure static directory exists
        run: mkdir -p static

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate availability.json (max 6 min)
        timeout-minutes: 6
        run: |
          timeout 360s python generate_availability.py
          code=$?
          if [ $code -eq 124 ]; then
            echo "⏱️ Abgebrochen: generate_availability.py hat das 6-Minuten-Limit überschritten."
            exit 1
          fi
          exit $code

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/availability.json
          git commit -m "Auto: Update availability.json [skip ci]" || echo "No changes to commit"
          git push
