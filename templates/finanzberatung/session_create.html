{% extends "hub/base.html" %}

{% block hub_title %}Neue Session erstellen{% endblock %}

{% block area_css %}
<style nonce="{{ csp_nonce }}">
    .finanz-card { background: #f5e6c8 !important; border-color: #d4af6a40 !important; font-family: 'DM Sans', 'Inter', sans-serif; }
    .finanz-card, .finanz-card * { color: #1a1a1a; }
    .finanz-card h1, .finanz-card h2, .finanz-card h3 { font-family: 'DM Serif Display', Georgia, serif; }
    .finanz-card input, .finanz-card textarea, .finanz-card select {
        background: #ffffff !important; color: #1a1a1a !important; border-color: #c9a050;
    }
    .finanz-card input:focus, .finanz-card textarea:focus, .finanz-card select:focus { border-color: #d4af6a; outline-color: #d4af6a80; }
    .finanz-card input::placeholder { color: #999; }
</style>
{% endblock %}

{% block content %}
<!-- Page Header -->
<div class="mb-8">
    <div class="flex items-center gap-2 text-sm text-base-content/50 mb-4">
        <a href="{{ url_for('finanzberatung.finanz_sessions.session_list') }}" class="hover:text-base-content transition-colors">Sessions</a>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
        <span>Neue Session</span>
    </div>
    <h1 class="text-2xl font-semibold">Neue Session erstellen</h1>
</div>

<!-- Creation Form -->
<div class="max-w-xl mx-auto">
    <div class="finanz-card rounded-lg shadow-sm border p-6">
        <form method="POST" action="{{ url_for('finanzberatung.finanz_sessions.session_create') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Customer Name -->
            <div class="form-control w-full mb-4">
                <label class="label">
                    <span class="label-text font-semibold">Kundenname</span>
                </label>
                <input type="text"
                       name="customer_name"
                       placeholder="Name des Kunden"
                       class="input input-bordered w-full"
                       required
                       autofocus>
            </div>

            <!-- Session Type -->
            <div class="form-control w-full mb-4">
                <label class="label">
                    <span class="label-text font-semibold">Art der Beratung</span>
                </label>
                <select name="session_type" class="select select-bordered w-full" required>
                    <option value="erstberatung">Erstberatung</option>
                    <option value="folgeberatung">Folgeberatung</option>
                </select>
            </div>

            <!-- Appointment Date -->
            <div class="form-control w-full mb-6">
                <label class="label">
                    <span class="label-text font-semibold">Termin</span>
                </label>
                <input type="date"
                       name="appointment_date"
                       class="input input-bordered w-full">
            </div>

            <!-- Opener Info -->
            <div class="flex items-center gap-2 text-sm text-base-content/50 mb-6 px-1">
                <i data-lucide="user" class="w-4 h-4"></i>
                <span>Opener: <strong>{{ current_user }}</strong></span>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-between">
                <a href="{{ url_for('finanzberatung.finanz_sessions.session_list') }}"
                   class="btn btn-ghost">
                    Abbrechen
                </a>
                <button type="submit" class="btn btn-primary gap-2">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    Session erstellen
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
