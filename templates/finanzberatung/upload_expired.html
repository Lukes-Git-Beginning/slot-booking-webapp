<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link abgelaufen - ZFA</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#d4af6a',
                        secondary: '#207487',
                        accent: '#294c5d',
                        'zfa-gray': '#77726d',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Header -->
    <div class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-lg mx-auto px-4 py-4 text-center">
            <div class="flex items-center justify-center gap-2 mb-1">
                <svg class="w-8 h-8 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span class="text-xl font-bold text-accent">ZFA</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex items-center justify-center px-4">
        <div class="max-w-sm text-center">
            <!-- Clock Icon -->
            <svg class="w-20 h-20 mx-auto mb-6 text-orange-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>

            <!-- Headline -->
            <h1 class="text-2xl font-bold text-accent mb-3">Link abgelaufen</h1>

            <!-- Error Message -->
            <p class="text-zfa-gray mb-4">{{ error_message }}</p>

            <!-- Subtext -->
            <p class="text-sm text-zfa-gray/70">
                Bitte wenden Sie sich an Ihren Berater fuer einen neuen Link.
            </p>
        </div>
    </div>

</body>
</html>
